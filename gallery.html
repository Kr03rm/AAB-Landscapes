<!DOCTYPE html>
<html lang="en">
<head>

<title>AAB Landscapes | Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

<style>

.gallery-container{
padding:60px 10%;
text-align:center;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.gallery-grid img{
width:100%;
height:250px;
object-fit:cover;
border-radius:8px;
transition:0.3s;
cursor:pointer;
}

.gallery-grid img:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<header>
<div class="header-container">
<img src="AAB LOGO.jpg" alt="AAB Landscapes Logo" class="logo">
<div class="header-text">
<h1>AAB Landscapes</h1>
<p>Professional Construction & Landscaping Services</p>
</div>
</div>
</header>

<nav>
<a href="index.html">Home</a>
<a href="#">Services</a>
<a href="gallery.html">Gallery</a>
<a href="#">Contact</a>
</nav>

<section class="gallery-container">

<h2>Our Work</h2>
<p>Examples of our landscaping and construction projects.</p>

<div class="gallery-grid">

<img src="Garden project.jfif" alt="Garden Project">
<img src="Patio Instalment.jfif" alt="Patio Installation">
<img src="Driveway picture.jfif" alt="Driveway Work">
<img src="Landscaping design.jfif" alt="Landscaping Design">
<img src="Garden Transformation.jfif" alt="Garden Transformation">
<img src="Outdoor Space.jfif" alt="Outdoor Space">

</div>

</section>

<footer>
<p>© 2026 AAB Landscapes | All Rights Reserved</p>
</footer>

</html>
